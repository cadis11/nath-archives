<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be My Valentine? 💖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffeef8 0%, #ffe5f5 50%, #ffd6f0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 20px;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 10;
            width: 100%;
        }

        .card {
            background: white;
            padding: 50px 40px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(255, 105, 180, 0.3);
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            position: relative;
        }

        h1 {
            font-size: 2.5rem;
            color: #ff69b4;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(255, 105, 180, 0.2);
        }

        .button-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 30px;
            min-height: 80px;
        }

        button {
            border: none;
            border-radius: 20px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            padding: 15px 30px;
        }

        #yesBtn {
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            color: white;
            transform: scale(1);
        }

        #yesBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(255, 105, 180, 0.4);
        }

        #yesBtn:active {
            transform: scale(0.98);
        }

        #noBtn {
            background: linear-gradient(135deg, #e0e0e0, #c0c0c0);
            color: #666;
            transform: scale(1);
            position: relative;
        }

        #noBtn:hover {
            background: linear-gradient(135deg, #d0d0d0, #b0b0b0);
        }

        /* Speech bubble */
        .speech-bubble {
            position: fixed;
            background: white;
            padding: 15px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            font-size: 1.1rem;
            color: #ff69b4;
            font-weight: bold;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1000;
            max-width: 250px;
            left: 50%;
            top: 30%;
            transform: translateX(-50%);
        }

        .speech-bubble.show {
            opacity: 1;
        }

        /* Success screen */
        .success-screen {
            display: none;
            text-align: center;
            min-height: 400px;
        }

        .success-screen.show {
            display: block;
        }

        .success-screen h2 {
            font-size: 3rem;
            color: #ff69b4;
            margin-bottom: 30px;
            opacity: 0;
            transform: scale(0.5);
        }

        .success-screen h2.show {
            animation: popIn 0.6s ease forwards;
        }

        @keyframes popIn {
            0% { 
                opacity: 0;
                transform: scale(0.5);
            }
            50% {
                transform: scale(1.1);
            }
            100% { 
                opacity: 1;
                transform: scale(1);
            }
        }

        .message-box {
            font-size: 1.8rem;
            color: #ff1493;
            margin: 25px 0;
            padding: 20px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(255, 105, 180, 0.3);
            opacity: 0;
            transform: translateY(30px);
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .message-box.show {
            animation: slideUp 0.8s ease forwards;
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .heart-float {
            position: fixed;
            font-size: 2rem;
            animation: floatUp 3s ease-in-out forwards;
            pointer-events: none;
            z-index: 999;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(180deg);
                opacity: 0;
            }
        }

        /* Confetti */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #ff69b4;
            animation: confetti-fall linear forwards;
            z-index: 1;
        }

        @keyframes confetti-fall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        @media (max-width: 600px) {
            .card {
                padding: 40px 25px;
            }
            h1 { 
                font-size: 1.8rem;
                margin-bottom: 30px;
            }
            button { 
                font-size: 1.1rem; 
                padding: 12px 25px; 
            }
            .success-screen h2 { 
                font-size: 2rem; 
            }
            .message-box { 
                font-size: 1.3rem;
                padding: 15px;
            }
            .speech-bubble {
                font-size: 1rem;
                max-width: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div id="questionScreen">
                <h1>Will you be my Valentine? 💖</h1>
                <div class="button-container">
                    <button id="yesBtn">YES 💕</button>
                    <button id="noBtn">NO 🙄</button>
                </div>
            </div>

            <div class="success-screen" id="successScreen">
                <h2 id="mainTitle">YAYYYY!! 💕🥰</h2>
                <div id="messagesContainer"></div>
            </div>
        </div>
    </div>

    <div class="speech-bubble" id="speechBubble"></div>

    <script>
        // Messages for NO button clicks
        const noMessages = [
            "Why are you pressing NO? 🥺",
            "That hurts my little heart 💔",
            "Come on… press YES 😭👉",
            "Are you sure about that? 🥺",
            "Please? Pretty please? 🥹",
            "My heart is breaking 💔",
            "Just one little YES? 🥺👉👈",
            "You're making me sad 😢",
            "Think about it again! 💭💕",
            "The YES button is getting bigger for a reason! 😉",
            "You know you want to say YES 💕"
        ];

        // Sequential love messages that appear one by one after YES
        const loveMessages = [
            "I love you so much! 💖",
            "You're my favorite person in the whole world 🌎",
            "Every moment with you is precious ✨",
            "You make my heart skip a beat 💓",
            "I can't imagine my life without you 🥰",
            "You're my sunshine on cloudy days ☀️",
            "Being with you feels like home 🏡",
            "You're the best thing that ever happened to me 🎁",
            "I'm so lucky to have you 🍀",
            "Forever and always, it's you and me 💑",
            "Thank you for being mine 💝"
        ];

        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const speechBubble = document.getElementById('speechBubble');
        const questionScreen = document.getElementById('questionScreen');
        const successScreen = document.getElementById('successScreen');
        const messagesContainer = document.getElementById('messagesContainer');
        const mainTitle = document.getElementById('mainTitle');

        let noClickCount = 0;
        let yesBtnScale = 1;
        let noBtnScale = 1;

        // NO button click handler
        noBtn.addEventListener('click', function(e) {
            noClickCount++;
            
            // Increase YES button size
            yesBtnScale += 0.2;
            yesBtn.style.transform = `scale(${yesBtnScale})`;
            
            // Decrease NO button size
            noBtnScale = Math.max(0.4, noBtnScale - 0.1);
            noBtn.style.transform = `scale(${noBtnScale})`;
            
            // Move NO button randomly (make it harder to click)
            const maxMove = Math.min(150, 50 + noClickCount * 10);
            const randomX = (Math.random() - 0.5) * maxMove;
            const randomY = (Math.random() - 0.5) * maxMove;
            noBtn.style.position = 'relative';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
            
            // Show random message
            const randomMessage = noMessages[Math.floor(Math.random() * noMessages.length)];
            showSpeechBubble(randomMessage);
            
            // Add a sad heart
            createFloatingHeart('💔', e.clientX, e.clientY);
        });

        // YES button click handler
        yesBtn.addEventListener('click', function(e) {
            // Create confetti
            createConfetti();
            
            // Create happy hearts
            for (let i = 0; i < 10; i++) {
                setTimeout(() => {
                    const x = e.clientX + (Math.random() - 0.5) * 100;
                    const y = e.clientY + (Math.random() - 0.5) * 100;
                    createFloatingHeart('💕', x, y);
                }, i * 100);
            }
            
            // Show success screen
            setTimeout(() => {
                questionScreen.style.display = 'none';
                successScreen.classList.add('show');
                showMainTitle();
            }, 500);
        });

        // Show main title
        function showMainTitle() {
            mainTitle.classList.add('show');
            
            // Start showing messages after title animation
            setTimeout(() => {
                displayMessagesSequentially();
            }, 1000);
        }

        // Display messages one by one with delays
        function displayMessagesSequentially() {
            // Shuffle messages to make it unique each time
            const shuffled = [...loveMessages].sort(() => 0.5 - Math.random());
            
            shuffled.forEach((message, index) => {
                setTimeout(() => {
                    const messageBox = document.createElement('div');
                    messageBox.className = 'message-box';
                    messageBox.textContent = message;
                    messagesContainer.appendChild(messageBox);
                    
                    // Trigger animation
                    setTimeout(() => {
                        messageBox.classList.add('show');
                    }, 50);
                    
                    // Add floating hearts for each message
                    setTimeout(() => {
                        for (let i = 0; i < 3; i++) {
                            const x = Math.random() * window.innerWidth;
                            const y = window.innerHeight;
                            createFloatingHeart(['❤️', '💕', '💖', '💗', '💓'][Math.floor(Math.random() * 5)], x, y);
                        }
                    }, 400);
                    
                }, index * 2000); // 2 seconds between each message
            });
        }

        // Show speech bubble
        function showSpeechBubble(message) {
            speechBubble.textContent = message;
            speechBubble.classList.add('show');
            
            setTimeout(() => {
                speechBubble.classList.remove('show');
            }, 2000);
        }

        // Create floating hearts
        function createFloatingHeart(emoji, x, y) {
            const heart = document.createElement('div');
            heart.className = 'heart-float';
            heart.textContent = emoji;
            heart.style.left = x + 'px';
            heart.style.top = y + 'px';
            heart.style.animationDuration = (Math.random() * 2 + 2) + 's';
            document.body.appendChild(heart);
            
            setTimeout(() => heart.remove(), 3000);
        }

        // Create confetti animation
        function createConfetti() {
            const colors = ['#ff69b4', '#ff1493', '#ffc0cb', '#ffb6c1', '#ff69b4', '#da70d6', '#ff6b9d'];
            
            for (let i = 0; i < 150; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.top = '-10px';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
                    confetti.style.animationDelay = Math.random() * 0.5 + 's';
                    confetti.style.width = (Math.random() * 10 + 5) + 'px';
                    confetti.style.height = (Math.random() * 10 + 5) + 'px';
                    confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                    document.body.appendChild(confetti);
                    
                    setTimeout(() => confetti.remove(), 5000);
                }, i * 30);
            }
        }
    </script>
</body>
</html>
